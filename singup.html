<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>Signup - CORATN</title>
    <link rel="stylesheet" href="SINGUP.CSS" />
  </head>
  <body>
    <div class="logincontainer">
      <div class="content">
        <h1>Create Account</h1>
        <form id="signupForm">
          <input type="email" placeholder="Email" id="email" required />
          <br />
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />
          <br />
          <input
            type="password"
            id="checkpassword"
            placeholder="Confirm Password"
            required
          />
          <br />
          <button type="submit" class="singupbtn">Sign Up</button>

          <div class="divider">OR</div>

          <button type="button" class="google-btn" id="googleBtn">
            Continue with Google
          </button>
        </form>
        <div class="footer-link">
          <p>Already have an account? <a href="login.html">Log in</a></p>
        </div>
      </div>
    </div>

    <script type="module">
      // 1. استيراد الدوال الضرورية مرة واحدة فقط
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
      import {
        getAuth,
        signInWithPopup,
        GoogleAuthProvider,
        createUserWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

      // 2. إعدادات Firebase (استخدم المشروع الأحدث coratn)
      const firebaseConfig = {
        apiKey: "AIzaSyCefYMTZl0i79yMQVFxOLWjPZhfWleQWW4",
        authDomain: "coratn-6de48.firebaseapp.com",
        projectId: "coratn-6de48",
        storageBucket: "coratn-6de48.firebasestorage.app",
        messagingSenderId: "249208103888",
        appId: "1:249208103888:web:9403ce3af4c00bfe6f0fd5",
        measurementId: "G-WQM9SRLPN9",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      // 3. منطق التسجيل بالإيميل والباسورد
      const signupForm = document.getElementById("signupForm");

      signupForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirmPass = document.getElementById("checkpassword").value;

        // التحقق من الشروط قبل الإرسال
        if (password.length < 6) {
          alert("Firebase requires at least 6 characters for security.");
          return;
        }

        if (password !== confirmPass) {
          alert("Passwords do not match!");
          return;
        }

        // تنفيذ عملية الإنشاء في Firebase
        createUserWithEmailAndPassword(auth, email, password)
          .then((userCredential) => {
            console.log("Success!");
            window.location.href = "home.html";
          })
          .catch((error) => {
            alert("Signup Failed: " + error.message);
          });
      });

      // 4. منطق جوجل (Popup هو الأفضل للمواقع البسيطة)
      document.getElementById("googleBtn").addEventListener("click", () => {
        signInWithPopup(auth, provider)
          .then((result) => {
            window.location.href = "home.html";
          })
          .catch((error) => {
            console.error("Google Error:", error.message);
          });
      });
    </script>
  </body>
</html>
