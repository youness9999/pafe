<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>Signup</title>
    <link rel="stylesheet" href="SINGUP.CSS" />
  </head>
  <body>
    <div class="logincontainer">
      <div class="content">
        <h1>Sign-up</h1>
        <form id="signupForm">
          <input type="email" placeholder="e-mail" id="email" required />
          <br />
          <input
            type="password"
            id="password"
            placeholder="password"
            required
          />
          <br />
          <input
            type="password"
            id="checkpassword"
            placeholder="confirm password"
            required
          />
          <br />
          <button type="submit" class="singupbtn">Signup</button>

          <button
            type="button"
            class="social-btn google-btn"
            onclick="signInWithGoogle()"
          >
            Continue with Google
          </button>
        </form>
        <div>
          <p>
            Already have an account?
            <a class="singup" href="login.html">log in</a>
          </p>
        </div>
      </div>
    </div>

    <script type="module">
      // 1. استيراد الدوال مرة واحدة فقط لتجنب التعارض
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
      import {
        getAuth,
        signInWithPopup,
        GoogleAuthProvider,
        createUserWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

      // استخدم config واحد فقط (تأكد أنه الخاص بمشروع coratn)
      const firebaseConfig = {
        apiKey: "AIzaSyCefYMTZl0i79yMQVFxOLWjPZhfWleQWW4",
        authDomain: "coratn-6de48.firebaseapp.com",
        projectId: "coratn-6de48",
        storageBucket: "coratn-6de48.firebasestorage.app",
        messagingSenderId: "249208103888",
        appId: "1:249208103888:web:9403ce3af4c00bfe6f0fd5",
        measurementId: "G-WQM9SRLPN9",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      // 2. معالجة الفورم (Signup Logic)
      const form = document.getElementById("signupForm");

      form.addEventListener("submit", function (event) {
        event.preventDefault(); // منع تحديث الصفحة

        const emailValue = document.getElementById("email").value;
        const passwordValue = document.getElementById("password").value;
        const passwordCheck = document.getElementById("checkpassword").value;

        // فحص الإيميل
        if (!emailValue.includes("@")) {
          alert("Please enter a valid email.");
          return;
        }

        // فحص طول كلمة المرور (Firebase يتطلب 6 أحرف تقريباً للأمان)
        if (passwordValue.length < 5) {
          alert("Password must be at least 5 characters long.");
          return;
        }

        // تصحيح خطأ المقارنة (استخدام === وليس =)
        if (passwordValue !== passwordCheck) {
          alert("Passwords do not match!");
          return;
        }

        // إنشاء الحساب في Firebase
        createUserWithEmailAndPassword(auth, emailValue, passwordValue)
          .then((userCredential) => {
            console.log("Account created successfully!");
            window.location.href = "home.html";
          })
          .catch((error) => {
            alert("Error: " + error.message);
          });
      });

      // 3. تسجيل الدخول بجوجل
      window.signInWithGoogle = () => {
        signInWithPopup(auth, provider)
          .then((result) => {
            window.location.href = "home.html";
          })
          .catch((error) => {
            console.error("Google Error:", error);
          });
      };
    </script>
  </body>
</html>
