<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="logincontainer">
      <div class="content">
        <h1>Create Account</h1>
        <form id="signupForm">
          <input type="email" id="email" placeholder="Email" required />
          <br />
          <input
            type="password"
            id="password"
            placeholder="Password (Min 5 chars)"
            required
          />
          <br />
          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            required
          />
          <br />
          <button type="submit" class="loginbtn">Sign Up</button>
        </form>
        <p>Already have an account? <a href="login.html">Login</a></p>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
      import {
        getAuth,
        createUserWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

      // نفس إعدادات Firebase الخاصة بك
      const firebaseConfig = {
        apiKey: "AIzaSyCefYMTZl0i79yMQVFxOLWjPZhfWleQWW4",
        authDomain: "coratn-6de48.firebaseapp.com",
        projectId: "coratn-6de48",
        storageBucket: "coratn-6de48.firebasestorage.app",
        messagingSenderId: "249208103888",
        appId: "1:249208103888:web:9403ce3af4c00bfe6f0fd5",
        measurementId: "G-WQM9SRLPN9",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const signupForm = document.getElementById("signupForm");

      signupForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        // 1. فحص طول كلمة السر (شرط الـ 5 أحرف)
        if (password.length < 6) {
          alert("Password too short! Must be at least 5 characters.");
          return;
        }

        // 2. فحص تطابق كلمتي السر
        if (password !== confirmPassword) {
          alert("Passwords do not match!");
          return;
        }

        // 3. إنشاء الحساب في Firebase
        createUserWithEmailAndPassword(auth, email, password)
          .then((userCredential) => {
            alert("Account created successfully!");
            window.location.href = "home.html";
          })
          .catch((error) => {
            alert("Error: " + error.message);
          });
      });
    </script>
  </body>
</html>
