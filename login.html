<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="logincontainer">
      <div class="content">
        <h1>Welcome back,</h1>
        <form id="loginForm">
          <input type="email" placeholder="e-mail" id="email" required />
          <br />
          <input
            type="password"
            id="password"
            placeholder="password"
            required
          />
          <br />
          <button type="submit" class="loginbtn">Login</button>
        </form>

        <button onclick="signInWithGoogle()" class="googlebtn">
          Sign in with Google
        </button>

        <div>
          <p>
            Don't have an account?
            <a class="singup" href="singup.html">Sign up</a>
          </p>
        </div>
      </div>
    </div>

    <script type="module">
      // 1. استيراد الدوال المطلوبة (أضفنا signInWithEmailAndPassword)
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
      import {
        getAuth,
        signInWithPopup,
        GoogleAuthProvider,
        onAuthStateChanged,
        signInWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCefYMTZl0i79yMQVFxOLWjPZhfWleQWW4",
        authDomain: "coratn-6de48.firebaseapp.com",
        projectId: "coratn-6de48",
        storageBucket: "coratn-6de48.firebasestorage.app",
        messagingSenderId: "249208103888",
        appId: "1:249208103888:web:9403ce3af4c00bfe6f0fd5",
        measurementId: "G-WQM9SRLPN9",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      // عناصر الواجهة
      const form = document.getElementById("loginForm");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");

      // 2. معالجة نموذج تسجيل الدخول
      form.addEventListener("submit", function (event) {
        event.preventDefault(); // منع الصفحة من التحديث

        const emailValue = emailInput.value;
        const passwordValue = passwordInput.value;

        // التحقق من الإيميل (يفضل استخدام regex أو فحص بسيط لـ @)
        if (!emailValue.includes("@")) {
          alert("Incorrect Email: Please enter a valid email address.");
          emailInput.focus();
          return;
        }

        // التحقق من طول كلمة المرور
        if (passwordValue.length < 5) {
          alert("Password too short: It must be at least 5 characters long.");
          passwordInput.focus();
          return;
        }

        // --- تنفيذ تسجيل الدخول الفعلي عبر Firebase ---
        signInWithEmailAndPassword(auth, emailValue, passwordValue)
          .then((userCredential) => {
            console.log("Logged in successfully:", userCredential.user);
            window.location.href = "home.html"; // التوجيه بعد النجاح
          })
          .catch((error) => {
            console.error("Login Error:", error.message);
            alert("Login failed: " + error.message); // تنبيه المستخدم في حال الخطأ
          });
      });

      // 3. مراقب حالة المستخدم (الحارس)
      onAuthStateChanged(auth, (user) => {
        if (user) {
          if (
            window.location.pathname.includes("login.html") ||
            window.location.pathname.endsWith("/")
          ) {
            window.location.href = "home.html";
          }
        }
      });

      // 4. دالة جوجل
      window.signInWithGoogle = () => {
        signInWithPopup(auth, provider)
          .then((result) => {
            console.log("Google login success:", result.user);
          })
          .catch((error) => {
            console.error("Google error:", error.message);
          });
      };
    </script>
  </body>
</html>
