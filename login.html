<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="logincontainer">
      <div class="content">
        <h1>Welcome back,</h1>
        <form id="loginForm">
          <input type="email" placeholder="e-mail" id="email" required />
          <br />
          <input
            type="password"
            id="password"
            placeholder="password"
            required
          />
          <br />
          <button type="submit" class="loginbtn">Login</button>
        </form>

        <button onclick="signInWithGoogle()" class="googlebtn">
          Sign in with Google
        </button>

        <div>
          <p>
            Don't have an account?
            <a class="singup" href="singup.html">Sign up</a>
          </p>
        </div>
      </div>
    </div>

    <script type="module">
      const form = document.getElementById("loginForm");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const comfirm = document.getElementById("checkpassword");

      form.addEventListener("submit", function (event) {
        const emailValue = emailInput.value;
        const passwordValue = passwordInput.value;
        const passwordcheck = comfirm.value;

        // 1. التحقق من علامة @ في الإيميل
        if (!emailValue.includes("@gmail.")) {
          event.preventDefault();
          alert(
            "Incorrect Email: Your email must contain the ' @gmail. ' symbol."
          );
          emailInput.focus();
          return; // توقف عن الفحص إذا فشل الشرط الأول
        }

        // 2. التحقق من أن كلمة المرور لا تقل عن 5 أحرف
        if (passwordValue.length < 5) {
          event.preventDefault(); // منع الإرسال
          alert("Password too short: It must be at least 5 characters long.");
          passwordInput.focus();
          return;
        }
        if ((passwordcheck = passwordValue)) {
        } else {
          event.preventDefault();
          alert("your password comfirm isnt correct");
          passwordcheck.focus();
          return;
        }
        // إذا نجحت كل الشروط
        console.log("Form submitted successfully!");
      });
      // 1. استيراد كل الدوال المطلوبة في مكان واحد لتجنب التكرار
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
      import {
        getAuth,
        signInWithPopup,
        GoogleAuthProvider,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCefYMTZl0i79yMQVFxOLWjPZhfWleQWW4",
        authDomain: "coratn-6de48.firebaseapp.com",
        projectId: "coratn-6de48",
        storageBucket: "coratn-6de48.firebasestorage.app",
        messagingSenderId: "249208103888",
        appId: "1:249208103888:web:9403ce3af4c00bfe6f0fd5",
        measurementId: "G-WQM9SRLPN9",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      // 2. مراقب حالة المستخدم (الحارس)
      onAuthStateChanged(auth, (user) => {
        if (user) {
          console.log("المستخدم موجود:", user.displayName);
          // التوجيه للصفحة الرئيسية إذا نجح الدخول
          if (
            window.location.pathname.includes("login.html") ||
            window.location.pathname.endsWith("/")
          ) {
            window.location.href = "home.html";
          }
        } else {
          console.log("لا يوجد مستخدم مسجل");
        }
      });

      // 3. دالة تسجيل الدخول بجوجل
      // جعل الدالة متاحة عالمياً لكي يعمل زر onclick
      window.signInWithGoogle = () => {
        signInWithPopup(auth, provider)
          .then((result) => {
            console.log("تم تسجيل الدخول بنجاح:", result.user);
          })
          .catch((error) => {
            console.error("حدث خطأ:", error.message);
          });
      };
    </script>
  </body>
</html>
